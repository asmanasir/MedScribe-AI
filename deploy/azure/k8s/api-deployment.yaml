# MedScribe API Server — the main application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medscribe-api
  namespace: medscribe
spec:
  replicas: 2  # High availability
  selector:
    matchLabels:
      app: medscribe-api
  template:
    metadata:
      labels:
        app: medscribe-api
    spec:
      containers:
        - name: api
          image: crmedscribe.azurecr.io/medscribe-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: MEDSCRIBE_ENVIRONMENT
              value: "production"
            - name: MEDSCRIBE_DEBUG
              value: "false"
            - name: MEDSCRIBE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medscribe-secrets
                  key: database-url
            - name: MEDSCRIBE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: medscribe-secrets
                  key: jwt-secret
            - name: MEDSCRIBE_LLM_BACKEND
              value: "ollama"
            - name: MEDSCRIBE_OLLAMA_BASE_URL
              value: "http://medscribe-ollama:11434"
            - name: MEDSCRIBE_STT_BACKEND
              value: "local"
            - name: MEDSCRIBE_WHISPER_MODEL
              value: "medium"  # Better accuracy with GPU
            - name: MEDSCRIBE_WHISPER_DEVICE
              value: "cuda"    # GPU acceleration
            - name: MEDSCRIBE_ALLOW_CLOUD_PROCESSING
              value: "false"
            - name: MEDSCRIBE_REQUIRE_HUMAN_APPROVAL
              value: "true"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: medscribe-api
  namespace: medscribe
spec:
  selector:
    app: medscribe-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
