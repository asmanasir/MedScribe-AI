name: CI — MedScribe AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/medscribe/ --ignore-missing-imports
        continue-on-error: true

      - name: Unit tests
        run: pytest tests/ -v --tb=short --cov=medscribe --cov-report=xml

      - name: Security scan (bandit via ruff)
        run: ruff check src/ --select S

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t medscribe-ai:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run -d --name test -p 8000:8000 \
            -e MEDSCRIBE_DEBUG=true \
            -e MEDSCRIBE_STT_BACKEND=local \
            -e MEDSCRIBE_LLM_BACKEND=ollama \
            medscribe-ai:${{ github.sha }} || true
